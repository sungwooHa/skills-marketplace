<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{DECK_TITLE}} — {{PRESENTER}}</title>
<style>
/* ===== Fonts ===== */
@font-face { font-family: 'DeckSans'; font-weight: 200; src: url('./assets/fonts/DeckSans-200.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 300; src: url('./assets/fonts/DeckSans-300.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 400; src: url('./assets/fonts/DeckSans-400.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 500; src: url('./assets/fonts/DeckSans-500.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 600; src: url('./assets/fonts/DeckSans-600.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 700; src: url('./assets/fonts/DeckSans-700.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 800; src: url('./assets/fonts/DeckSans-800.otf') format('opentype'); }
@font-face { font-family: 'DeckSans'; font-weight: 900; src: url('./assets/fonts/DeckSans-900.otf') format('opentype'); }

/* ===== Reset ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'DeckSans', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

/* ===== Design tokens ===== */
:root {
  --bg-navy: #0A0F21;
  --bg-black: #000000;
  --bg-white: #FFFFFF;
  --text-white: #FFFFFF;
  --text-white-60: rgba(255,255,255,0.6);
  --text-white-40: rgba(255,255,255,0.4);
  --text-navy: #0A0F21;
  --accent: #398EF6;
  --accent-deep: #004FD1;
  --red-cross: #E63946;
  --gray-overlay: rgba(140,140,150,0.55);
}

/* ===== Stage (1920x1080 fixed → scaled to viewport) ===== */
.deck-stage {
  position: fixed; inset: 0;
  background: #000;
  overflow: hidden;
}
.deck {
  position: absolute;
  left: 50%; top: 50%;
  width: 1920px; height: 1080px;
  transform: translate(-50%, -50%) scale(var(--scale, 1));
  transform-origin: center center;
}

/* ===== Slide base ===== */
.slide {
  position: absolute; inset: 0;
  width: 1920px; height: 1080px;
  background: var(--bg-navy);
  color: var(--text-white);
  opacity: 0; visibility: hidden;
  transition: opacity 0.4s ease;
  overflow: hidden;
}
.slide.active { opacity: 1; visibility: visible; }
.slide.bg-black { background: var(--bg-black); }
.slide.bg-white { background: var(--bg-white); color: var(--text-navy); }

/* (brand mark removed per user request) */

/* ===== Type scale (1pt ≈ 1.333px @ 1920×1080) ===== */
.t-impact { font-size: 173px; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
.t-mega   { font-size: 147px; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
.t-display1 { font-size: 120px; font-weight: 800; line-height: 1.1; letter-spacing: -0.015em; }
.t-display2 { font-size: 93px;  font-weight: 700; line-height: 1.18; letter-spacing: -0.012em; }
.t-headline { font-size: 67px;  font-weight: 700; line-height: 1.25; letter-spacing: -0.008em; }
.t-subhead  { font-size: 47px;  font-weight: 500; line-height: 1.4; }
.t-body-lg  { font-size: 33px;  font-weight: 400; line-height: 1.5; }
.t-body     { font-size: 27px;  font-weight: 400; line-height: 1.5; }
.t-caption  { font-size: 24px;  font-weight: 400; line-height: 1.4; }

.fw-r { font-weight: 400; } .fw-m { font-weight: 500; } .fw-sb { font-weight: 600; }
.fw-b { font-weight: 700; } .fw-eb { font-weight: 800; }
.c-accent { color: var(--accent); }
.c-deep { color: var(--accent-deep); }
.c-w60 { color: var(--text-white-60); }
.c-w40 { color: var(--text-white-40); }
.c-red { color: var(--red-cross); }
.center { text-align: center; }

/* ===== Layout helpers ===== */
.slide-pad { padding: 96px 128px; height: 100%; display: flex; flex-direction: column; }
.center-stack { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 96px; }
.center-left  { height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 96px 144px; gap: 32px; }

/* ===== Animation primitives (triggered when .active.play) ===== */
.fade { opacity: 0; transform: translateY(8px); transition: opacity 0.7s ease, transform 0.7s ease; }
.slide.active.play .fade { opacity: 1; transform: none; }
/* delay grid: 0.0s ~ 6.0s in 0.1s steps */
.slide.active.play .fade.d0   { transition-delay: 0s; }
.slide.active.play .fade.d2   { transition-delay: 0.2s; }
.slide.active.play .fade.d3   { transition-delay: 0.3s; }
.slide.active.play .fade.d4   { transition-delay: 0.4s; }
.slide.active.play .fade.d5   { transition-delay: 0.5s; }
.slide.active.play .fade.d6   { transition-delay: 0.6s; }
.slide.active.play .fade.d7   { transition-delay: 0.7s; }
.slide.active.play .fade.d8   { transition-delay: 0.8s; }
.slide.active.play .fade.d9   { transition-delay: 0.9s; }
.slide.active.play .fade.d10  { transition-delay: 1.0s; }
.slide.active.play .fade.d11  { transition-delay: 1.1s; }
.slide.active.play .fade.d12  { transition-delay: 1.2s; }
.slide.active.play .fade.d13  { transition-delay: 1.3s; }
.slide.active.play .fade.d14  { transition-delay: 1.4s; }
.slide.active.play .fade.d15  { transition-delay: 1.5s; }
.slide.active.play .fade.d16  { transition-delay: 1.6s; }
.slide.active.play .fade.d17  { transition-delay: 1.7s; }
.slide.active.play .fade.d18  { transition-delay: 1.8s; }
.slide.active.play .fade.d19  { transition-delay: 1.9s; }
.slide.active.play .fade.d20  { transition-delay: 2.0s; }
.slide.active.play .fade.d21  { transition-delay: 2.1s; }
.slide.active.play .fade.d22  { transition-delay: 2.2s; }
.slide.active.play .fade.d23  { transition-delay: 2.3s; }
.slide.active.play .fade.d24  { transition-delay: 2.4s; }
.slide.active.play .fade.d25  { transition-delay: 2.5s; }
.slide.active.play .fade.d26  { transition-delay: 2.6s; }
.slide.active.play .fade.d27  { transition-delay: 2.7s; }
.slide.active.play .fade.d28  { transition-delay: 2.8s; }
.slide.active.play .fade.d29  { transition-delay: 2.9s; }
.slide.active.play .fade.d30  { transition-delay: 3.0s; }
.slide.active.play .fade.d33  { transition-delay: 3.3s; }
.slide.active.play .fade.d35  { transition-delay: 3.5s; }
.slide.active.play .fade.d38  { transition-delay: 3.8s; }
.slide.active.play .fade.d40  { transition-delay: 4.0s; }
.slide.active.play .fade.d42  { transition-delay: 4.2s; }
.slide.active.play .fade.d45  { transition-delay: 4.5s; }
.slide.active.play .fade.d48  { transition-delay: 4.8s; }
.slide.active.play .fade.d50  { transition-delay: 5.0s; }
.slide.active.play .fade.d55  { transition-delay: 5.5s; }
.slide.active.play .fade.d60  { transition-delay: 6.0s; }
.slide.active.play .fade.d65  { transition-delay: 6.5s; }
.slide.active.play .fade.d70  { transition-delay: 7.0s; }
.slide.active.play .fade.d75  { transition-delay: 7.5s; }
.slide.active.play .fade.d80  { transition-delay: 8.0s; }
.fade.no-y { transform: none; }

/* ===== Background image / video frames ===== */
.bg-frame { position: absolute; inset: 0; }
.bg-frame img, .bg-frame video {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.62) saturate(0.9) contrast(1.0);
}
.bg-overlay { position: absolute; inset: 0; }
/* gradient-bottom: 위는 거의 투명, 아래 텍스트 영역만 어둡게 */
.bg-overlay.gradient-bottom { background: linear-gradient(180deg, rgba(10,15,33,0.05) 0%, rgba(10,15,33,0.25) 45%, rgba(10,15,33,0.82) 80%, rgba(10,15,33,0.92) 100%); }
/* gradient-left: 좌측 텍스트 영역만 어둡게 */
.bg-overlay.gradient-left { background: linear-gradient(90deg, rgba(10,15,33,0.92) 0%, rgba(10,15,33,0.7) 50%, rgba(10,15,33,0.25) 100%); }
.bg-overlay.gradient-uniform { background: rgba(10,15,33,0.55); }

/* ===== HUD ===== */
.hud {
  position: fixed; bottom: 16px; right: 24px;
  font-family: 'DeckSans', sans-serif; color: rgba(255,255,255,0.45);
  font-size: 13px; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 16px;
  user-select: none;
  z-index: 100;
}
.hud .counter { font-variant-numeric: tabular-nums; }
.hud .hint { color: rgba(255,255,255,0.25); }

/* ===== Slide-specific patterns ===== */

/* Quote slide (S2, S17 inline) */
.quote-block { max-width: 1450px; }
.quote-mark { font-size: 200px; font-weight: 700; color: var(--text-white-40); line-height: 0.7; margin-bottom: 24px; }
.quote-mark.close { text-align: right; margin-top: 24px; margin-bottom: 0; transform: translateY(-20px); }
.quote-text { font-size: 75px; font-weight: 700; line-height: 1.35; letter-spacing: -0.01em; }

/* Question mark slide (S4) */
.intent-arrow {
  display: flex; align-items: center; justify-content: center; gap: 80px;
  font-size: 85px; font-weight: 800;
}
.intent-arrow .qmark {
  width: 140px; height: 140px;
  border: 4px solid var(--accent);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 90px; font-weight: 800; color: var(--accent);
}

/* Diagonal red strike (S16, S18, S20) — strikes the SENTENCE only */
.strike-keyword {
  position: relative; display: flex; flex-direction: column; align-items: center; gap: 96px;
  height: 100%; justify-content: center;
}
.strike-keyword .kw { font-size: 220px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
.strike-keyword .sub {
  position: relative; font-size: 67px; font-weight: 400;
  padding: 12px 48px; display: inline-block;
}
.strike-svg {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}
.strike-svg line {
  stroke: var(--red-cross);
  stroke-width: 10;
  stroke-linecap: round;
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.7, 0, 0.3, 1);
}
.slide.active.play .strike-svg line {
  stroke-dashoffset: 0;
  transition-delay: 1.1s;
}

/* Three mirrors intro (S15) */
.three-mirrors {
  display: flex; gap: 96px; justify-content: center; align-items: baseline;
}
.three-mirrors .m { font-size: 100px; font-weight: 700; opacity: 0; color: var(--text-white); transition: opacity 0.7s ease; }
.slide.active.play .three-mirrors .m1 { opacity: 1; transition-delay: 0.3s; }
.slide.active.play .three-mirrors .m2 { opacity: 1; transition-delay: 0.8s; }
.slide.active.play .three-mirrors .m3 { opacity: 1; transition-delay: 1.3s; }

/* Two columns split (S10) */
.split-2 { display: flex; align-items: center; justify-content: center; gap: 80px; }
.split-2 .col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.split-2 .col .lab { font-size: 33px; color: var(--text-white-60); }
.split-2 .col .word { font-size: 153px; font-weight: 800; letter-spacing: -0.02em; }
.split-2 .neq { font-size: 120px; font-weight: 700; color: var(--text-white-40); }

/* Sequential list (S9, S28, S30) */
.numbered-list { display: flex; flex-direction: column; gap: 36px; }
.numbered-list .item { display: flex; align-items: baseline; gap: 32px; }
.numbered-list .num { font-size: 60px; font-weight: 700; color: var(--accent); width: 80px; flex-shrink: 0; line-height: 1; }
.numbered-list .text { font-size: 60px; font-weight: 700; line-height: 1.3; }
.numbered-list .text small { font-size: 36px; font-weight: 400; color: var(--text-white-60); display: block; margin-top: 8px; }
.numbered-list.nkb .num { width: 220px; }
.numbered-list.nkb .num .sep { color: var(--text-white-40); margin: 0 0.18em; }
.numbered-list.nkb .num .syl { color: var(--text-white); }

/* S29 부재의 가치 — 박스 없음 (액센트 바 제거) */
.signature-box {
  padding: 16px 0;
  margin-top: 32px;
  text-align: left;
  font-size: 42px; font-weight: 600; line-height: 1.45;
  max-width: 1400px;
}
.signature-box .lab {
  display: block; font-size: 22px; font-weight: 500;
  color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px;
}

/* Mirror verification (S31) — mirror centered, labels on both sides, dotlines pass through */
.s31-stack {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 96px;
  gap: 96px;
}
.s31-block {
  position: relative;
  width: 1500px;
  display: flex; flex-direction: column;
  gap: 64px;
}
.s31-row {
  display: grid;
  grid-template-columns: 1fr 600px 1fr;
  align-items: center;
}
.s31-row .lab-l {
  text-align: right; padding-right: 56px;
  font-size: 44px; font-weight: 700; line-height: 1.2;
}
.s31-row .lab-r {
  text-align: left; padding-left: 56px;
  font-size: 44px; font-weight: 700; line-height: 1.2;
}
.s31-row .dotline {
  border-top: 2px dotted var(--accent);
  height: 0; align-self: center;
}
.s31-mirror {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 240px; height: 520px;
  border-radius: 120px 120px 110px 110px;
  background:
    /* 좌상단 하이라이트 (하늘 반사) */
    radial-gradient(ellipse 80px 110px at 30% 22%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 45%, transparent 70%),
    /* 대각선 글레어 */
    linear-gradient(125deg, transparent 35%, rgba(255,255,255,0.07) 48%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.07) 52%, transparent 65%),
    /* 글래스 베이스 */
    linear-gradient(180deg, rgba(57,142,246,0.32) 0%, rgba(57,142,246,0.14) 35%, rgba(57,142,246,0.04) 70%, rgba(57,142,246,0.0) 100%);
  box-shadow:
    /* 외곽 발광 */
    0 0 0 3px rgba(57,142,246,0.55),
    0 0 0 5px rgba(57,142,246,0.18),
    0 0 60px rgba(57,142,246,0.35),
    /* 내부 깊이 */
    inset 0 0 80px rgba(57,142,246,0.06),
    inset 0 6px 24px rgba(255,255,255,0.05);
  pointer-events: none;
  z-index: 2;
  /* opacity-only animation — translate transform 보존 */
  opacity: 0;
  transition: opacity 1.0s ease 0.5s;
}
.slide.active.play .s31-mirror { opacity: 1; }

/* End slide (S32) */
.end-stack { display: flex; flex-direction: column; align-items: center; gap: 64px; height: 100%; justify-content: center; }
.end-stack .l1 { font-size: 93px; font-weight: 700; color: var(--text-navy); }
.end-stack .l2 { font-size: 67px; font-weight: 700; color: var(--text-navy); }
.end-stack .l2 .underline { border-bottom: 3px solid var(--accent); padding-bottom: 4px; }
.end-stack .l3 { font-size: 120px; font-weight: 800; color: var(--text-navy); margin-top: 32px; }

/* Footer caption (Intro 4 / image slides) */
.foot-caption {
  position: absolute; bottom: 32px; left: 48px;
  font-size: 22px; color: var(--text-white-40);
}

/* Source caption (top-right or bottom-right under image) */
.src-caption { position: absolute; bottom: 32px; right: 48px; font-size: 22px; color: var(--text-white-40); }

/* S6 / S17 / S19 / S21 image-bg slides */
.bg-side-text {
  position: absolute; left: 144px; top: 50%; transform: translateY(-50%);
  max-width: 1100px; z-index: 2;
}
.bg-side-text .lab { font-size: 28px; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.05em; }
.bg-side-text .quote {
  font-size: 67px; font-weight: 700; line-height: 1.3; padding: 24px 32px 24px 40px;
  white-space: nowrap;
}

/* Centered floating text on image */
.bg-center-text {
  position: absolute; inset: 0; display: grid; place-items: center; z-index: 2;
  padding: 96px;
}
.bg-center-text .line { font-size: 80px; font-weight: 700; line-height: 1.3; max-width: 1500px; text-align: center; }

/* S22 점진적 시퀀스 — 거짓된 의도 → 자기/타인 전염 → 함께 속였다 */
.s22-stack {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 96px 144px;
  gap: 40px;
}
.s22-top { text-align: center; }
.s22-divider { width: 480px; height: 1px; background: var(--text-white-40); }
.s22-cascade {
  display: flex; flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}
.s22-cascade .cas-line {
  font-size: 50px; font-weight: 600; line-height: 1.4;
  color: var(--text-white);
}
.s22-cascade .cas-self { color: var(--accent); font-weight: 800; }
.s22-cascade .cas-target { color: var(--accent); font-weight: 800; }
.s22-cascade .cas-because { color: var(--text-white-40); font-weight: 400; }
.s22-impact {
  font-size: 96px; font-weight: 800; letter-spacing: -0.02em;
  text-align: center; line-height: 1.1;
}
.s22-impact .accent { color: var(--accent); }

/* S23 — "사람" word covered by SYSTEM/PROCESS overlay blocks */
.hide-stack { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 56px; padding: 64px; }
.hide-canvas {
  position: relative;
  width: 1280px; height: 480px;
  display: flex; align-items: center; justify-content: center;
}
.hide-canvas .person-word {
  position: absolute;
  font-size: 540px; font-weight: 800; letter-spacing: -0.03em;
  color: rgba(255,255,255,0.42);
  line-height: 1;
  white-space: nowrap;
}
.hide-blocks {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px;
  z-index: 2;
}
.hide-blocks .blk {
  background: #FFFFFF;
  color: #0A0F21;
  padding: 32px 80px;
  font-size: 88px; font-weight: 800;
  min-width: 760px; text-align: center;
  letter-spacing: -0.02em;
  box-shadow:
    0 24px 60px rgba(0,0,0,0.55),
    0 8px 16px rgba(0,0,0,0.4);
  transform: translateX(-130vw);
  transition: transform 1.6s cubic-bezier(0.16, 0.7, 0.18, 1);
}
.hide-blocks .blk.b2 { transform: translateX(130vw); }
.slide.active.play .hide-blocks .blk.b1 { transform: translateX(0); transition-delay: 1.0s; }
.slide.active.play .hide-blocks .blk.b2 { transform: translateX(0); transition-delay: 2.6s; }

/* S24 — 두 트리거가 가운데 "나"를 향함 (화살표 메타포) */
.s24-trigger svg { overflow: visible; }
.s24-trigger .nu-circle,
.s24-trigger .nu-text,
.s24-trigger .gam-text,
.s24-trigger .trig-l-text,
.s24-trigger .trig-r-text,
.s24-trigger .arr-l-h,
.s24-trigger .arr-r-h {
  opacity: 0;
  transition: opacity 0.6s ease;
}
.s24-trigger .arr-l-line,
.s24-trigger .arr-r-line {
  stroke-dasharray: 450;
  stroke-dashoffset: 450;
  transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.slide.active.play .s24-trigger .nu-circle,
.slide.active.play .s24-trigger .nu-text { opacity: 1; transition-delay: 0.5s; }
.slide.active.play .s24-trigger .gam-text { opacity: 1; transition-delay: 1.0s; }
.slide.active.play .s24-trigger .trig-l-text { opacity: 1; transition-delay: 1.4s; }
.slide.active.play .s24-trigger .arr-l-line { stroke-dashoffset: 0; transition-delay: 1.7s; }
.slide.active.play .s24-trigger .arr-l-h { opacity: 1; transition-delay: 2.3s; }
.slide.active.play .s24-trigger .trig-r-text { opacity: 1; transition-delay: 2.7s; }
.slide.active.play .s24-trigger .arr-r-line { stroke-dashoffset: 0; transition-delay: 3.0s; }
.slide.active.play .s24-trigger .arr-r-h { opacity: 1; transition-delay: 3.6s; }

/* S29 행동 셋 */
.action-three { display: flex; flex-direction: column; gap: 32px; align-items: center; }
.action-three .item {
  display: flex; align-items: baseline; gap: 24px;
  font-size: 56px; font-weight: 700;
}
.action-three .num { color: var(--accent); width: 50px; }
.action-three .divider { width: 100%; height: 1px; background: var(--accent); opacity: 0.3; }

/* S26 quote impact — 3행 누적 */
.steal-quote {
  font-size: 110px; font-weight: 800; line-height: 1.25;
  text-align: center; margin: 0 auto;
  display: flex; flex-direction: column; gap: 4px;
}
.steal-quote .ln { display: block; }
.steal-quote .grab { color: var(--accent); }

/* S27 knot 3x3 */
.s27-stack {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%;
  padding: 96px;
  gap: 96px;
}
.s27-top { text-align: center; }
.s27-divider { width: 720px; height: 1px; background: var(--text-white-40); }
.knot-grid { display: flex; flex-direction: column; gap: 56px; }
.knot-row { display: flex; align-items: center; justify-content: center; gap: 32px; }
.knot-row .word { font-size: 60px; font-weight: 700; min-width: 240px; text-align: center; }
.knot-row .word.middle { color: var(--accent); }
.knot-row svg { flex-shrink: 0; }

/* ===== Page 30 row arrows (sequential left-to-right, top-to-bottom) ===== */
[data-slide="29"] .row-arrow { clip-path: inset(0 100% 0 0); transition: clip-path 0.55s cubic-bezier(0.7, 0, 0.3, 1); }
.slide.active.play[data-slide="29"] .knot-row .row-arrow { clip-path: inset(0 0 0 0); }
.slide.active.play[data-slide="29"] .knot-row.r1 .row-arrow.arr1 { transition-delay: 0.8s; }
.slide.active.play[data-slide="29"] .knot-row.r1 .row-arrow.arr2 { transition-delay: 1.8s; }
.slide.active.play[data-slide="29"] .knot-row.r2 .row-arrow.arr1 { transition-delay: 3.3s; }
.slide.active.play[data-slide="29"] .knot-row.r2 .row-arrow.arr2 { transition-delay: 4.3s; }
.slide.active.play[data-slide="29"] .knot-row.r3 .row-arrow.arr1 { transition-delay: 6.0s; }
.slide.active.play[data-slide="29"] .knot-row.r3 .row-arrow.arr2 { transition-delay: 7.0s; }

/* ===== Pivot transition overlay (slide 14 -> 15) ===== */
#transition-overlay {
  position: fixed; inset: 0;
  background: #000;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.35s ease;
  will-change: opacity;
}
#transition-overlay.show { opacity: 1; }
#transition-overlay .ti-svg {
  width: min(62vmin, 760px);
  height: min(62vmin, 760px);
  overflow: visible;
  opacity: 0;
  transform: scale(0.45);
  transform-origin: center center;
  transition: opacity 0.35s ease, transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: opacity, transform;
}
#transition-overlay.show .ti-svg {
  opacity: 1;
  transform: scale(1);
  transition: opacity 0.35s ease 0.05s, transform 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.05s;
}
#transition-overlay .ti-motif {
  font-family: 'DeckSans', -apple-system, sans-serif;
  font-size: 240px;
  font-weight: 800;
  fill: #FFFFFF;
  letter-spacing: -0.02em;
}
#transition-overlay .ti-arrow-g line { stroke: var(--accent); stroke-width: 9; }
#transition-overlay .ti-arrow-g polygon { fill: var(--accent); }
#transition-overlay .arrows-out { opacity: 1; transition: opacity 0.25s ease; }
#transition-overlay .arrows-in  { opacity: 0; transition: opacity 0.25s ease 0.25s; }
#transition-overlay.flip .arrows-out { opacity: 0; }
#transition-overlay.flip .arrows-in  { opacity: 1; }
</style>
</head>
<body>

<div id="transition-overlay" aria-hidden="true">
  <svg class="ti-svg" viewBox="0 0 800 800">
    <text class="ti-motif" x="400" y="478" text-anchor="middle">{{MOTIF_GLYPH}}</text>
    <g class="ti-arrow-g arrows-out">
      <line x1="500" y1="400" x2="700" y2="400"/>
      <polygon points="700,400 670,384 670,416"/>
      <line x1="300" y1="400" x2="100" y2="400"/>
      <polygon points="100,400 130,384 130,416"/>
      <line x1="400" y1="300" x2="400" y2="100"/>
      <polygon points="400,100 384,130 416,130"/>
      <line x1="400" y1="500" x2="400" y2="700"/>
      <polygon points="400,700 384,670 416,670"/>
    </g>
    <g class="ti-arrow-g arrows-in">
      <line x1="700" y1="400" x2="500" y2="400"/>
      <polygon points="500,400 530,384 530,416"/>
      <line x1="100" y1="400" x2="300" y2="400"/>
      <polygon points="300,400 270,384 270,416"/>
      <line x1="400" y1="100" x2="400" y2="300"/>
      <polygon points="400,300 384,270 416,270"/>
      <line x1="400" y1="700" x2="400" y2="500"/>
      <polygon points="400,500 384,530 416,530"/>
    </g>
  </svg>
</div>

<div class="deck-stage">
  <div class="deck" id="deck">

    <!-- SLIDES_START -->
    <!-- deck-builder가 plan.md 기반으로 슬라이드를 여기에 삽입합니다 -->
    <!-- SLIDES_END -->


  </div>
</div>

<div class="hud">
  <span class="counter"><span id="cur">1</span> / <span id="total">34</span></span>
  <span class="hint">← →  Space  F  P(발표자)  ESC</span>
  <span id="link-badge" style="margin-left:12px; padding:2px 8px; border-radius:6px; background:rgba(57,142,246,0.18); color:#9CC7FF; font-size:11px; display:none;">LINK</span>
</div>

<script>
(function() {
  const deck = document.getElementById('deck');
  const slides = Array.from(deck.querySelectorAll('.slide'));
  const total = slides.length;
  const curEl = document.getElementById('cur');
  const totalEl = document.getElementById('total');
  totalEl.textContent = total;

  let current = 0;
  let inTransition = false;
  const overlay = document.getElementById('transition-overlay');

  // ===== Presenter sync =====
  const SYNC_CHANNEL = 'mirror-deck-sync';
  let bc = null;
  try { bc = new BroadcastChannel(SYNC_CHANNEL); } catch (e) {}
  let presenterWin = null;
  let suppressBroadcast = false;
  const linkBadge = document.getElementById('link-badge');

  function broadcastSync(idx) {
    if (suppressBroadcast) return;
    const msg = { type: 'sync', syncIdx: idx, source: 'main' };
    if (bc) { try { bc.postMessage(msg); } catch (e) {} }
    if (presenterWin && !presenterWin.closed) {
      try { presenterWin.postMessage(msg, '*'); } catch (e) {}
    }
    if (window.opener && !window.opener.closed) {
      try { window.opener.postMessage(msg, '*'); } catch (e) {}
    }
  }

  function handleRemote(msg) {
    if (!msg || msg.source === 'main') return;
    if (msg.type === 'request-sync') {
      // presenter just opened — re-send our state
      broadcastSync(current);
      if (linkBadge) linkBadge.style.display = 'inline-block';
      return;
    }
    if (msg.type === 'sync' && typeof msg.syncIdx === 'number') {
      const target = Math.max(0, Math.min(total - 1, msg.syncIdx));
      if (target !== current) {
        suppressBroadcast = true;
        _swap(target);
        suppressBroadcast = false;
      }
      if (linkBadge) linkBadge.style.display = 'inline-block';
    }
  }

  if (bc) bc.onmessage = (e) => handleRemote(e.data);
  window.addEventListener('message', (e) => handleRemote(e.data));

  function openPresenter() {
    if (presenterWin && !presenterWin.closed) {
      presenterWin.focus();
      broadcastSync(current);
      return;
    }
    const w = Math.min(1280, screen.availWidth);
    const h = Math.min(800, screen.availHeight);
    presenterWin = window.open('스크립트_화면.html', 'mirror-presenter',
      `width=${w},height=${h},menubar=no,toolbar=no,location=no,status=no`);
    if (!presenterWin) {
      alert('팝업이 차단되었습니다. 브라우저 팝업 허용 후 다시 P를 누르세요.');
      return;
    }
    if (linkBadge) linkBadge.style.display = 'inline-block';
    // initial sync once child loads
    setTimeout(() => broadcastSync(current), 600);
    setTimeout(() => broadcastSync(current), 1500);
  }

  function _swap(idx) {
    slides.forEach((s, i) => {
      s.classList.toggle('active', i === idx);
      if (i !== idx) s.classList.remove('play');
    });
    requestAnimationFrame(() => {
      slides[idx].classList.add('play');
    });
    current = idx;
    curEl.textContent = idx + 1;
    document.querySelectorAll('video').forEach(v => v.pause());
    const v = slides[idx].querySelector('video');
    if (v) { v.currentTime = 0; v.play().catch(() => {}); }
    broadcastSync(idx);
  }

  function showSlide(idx) {
    if (idx < 0) idx = 0;
    if (idx >= total) idx = total - 1;
    _swap(idx);
  }

  function fitScale() {
    const sw = window.innerWidth, sh = window.innerHeight;
    const scale = Math.min(sw / 1920, sh / 1080);
    document.documentElement.style.setProperty('--scale', scale);
  }

  window.addEventListener('resize', fitScale);
  fitScale();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
      e.preventDefault();
      showSlide(current + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault();
      showSlide(current - 1);
    } else if (e.key === 'Home') {
      showSlide(0);
    } else if (e.key === 'End') {
      showSlide(total - 1);
    } else if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    } else if (e.key === 'p' || e.key === 'P') {
      e.preventDefault();
      openPresenter();
    }
  });

  // Click to advance
  document.addEventListener('click', (e) => {
    if (e.target.closest('.hud')) return;
    showSlide(current + 1);
  });

  showSlide(0);
})();
</script>

</body>
</html>
